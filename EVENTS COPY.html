<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webhook Sender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e1f26;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    textarea {
      background: #2a2c35;
      color: white;
      resize: none; /* ✅ disables resizing */
    }

    button {
      background: #5865F2;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4752c4;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Send to Discord</h2>

  <textarea id="message" rows="4" placeholder="Your message..."></textarea>

  <button onclick="sendMessage()">Send</button>

  <div class="status" id="status"></div>
</div>

<script>
  // 🔒 SET YOUR WEBHOOK HERE
  const WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";

  async function sendMessage() {
    const message = document.getElementById("message").value;
    const status = document.getElementById("status");

    if (!message) {
      status.textContent = "Message is required.";
      return;
    }

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: message
        })
      });

      if (res.ok) {
        status.textContent = "Message sent successfully!";
        document.getElementById("message").value = "";
      } else {
        status.textContent = "Failed to send message.";
      }
    } catch (err) {
      status.textContent = "Error: " + err.message;
    }
  }
</script>

</body>
</html>
